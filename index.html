<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة العيد - فريق برلين التطوعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            /* حركة انتقال ناعمة للصفحات */
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 {
            color: #1a4670;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 22px;
        }
        input[type="text"] {
            width: 90%;
            padding: 15px;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #2b7bc0;
            box-shadow: 0 0 8px rgba(43, 123, 192, 0.2);
        }
        button {
            background-color: #2b7bc0;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            width: 90%;
            max-width: 300px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #1a4670;
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        /* إخفاء صفحة النتيجة في البداية */
        #resultPage {
            display: none;
        }
    </style>
</head>
<body>

    <div id="inputPage" class="container">
        <h2>أصدر بطاقة التهنئة الخاصة بك</h2>
        <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." maxlength="30">
        <br>
        <button onclick="generateCard()">إنشاء البطاقة</button>
    </div>

    <div id="resultPage" class="container">
        <h2>كل عام وأنت بخير! 🎉</h2>
        <canvas id="canvas"></canvas>
        <br>
        <button class="btn-success" onclick="downloadImage()">تحميل البطاقة لجهازك</button>
        <br>
        <button class="btn-secondary" onclick="goBack()">رجوع وتعديل الاسم</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const image = new Image();
        
        // الصورة بالصيغة الكبيرة كما طلبنا
        image.src = 'card.PNG'; 

        let imageLoaded = false;
        image.onload = function() {
            imageLoaded = true;
        };

        function generateCard() {
            if (!imageLoaded) {
                alert('جاري تحميل تصميم البطاقة، يرجى المحاولة بعد ثانية...');
                return;
            }

            const name = document.getElementById('nameInput').value.trim();
            if(!name) {
                alert('الرجاء كتابة اسمك أولاً في المربع المخصص!');
                return;
            }

            // رسم البطاقة
            canvas.width = image.width;
            canvas.height = image.height;
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

            // تصغير الخط شوي (صار 75 بدل 85)
            ctx.font = 'bold 75px Tajawal'; 
            ctx.fillStyle = '#1a4670'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const x = canvas.width / 2; 
            const y = canvas.height * 0.435; 

            ctx.fillText(name, x, y);

            // إخفاء صفحة الإدخال وإظهار صفحة النتيجة (محاكاة الانتقال لصفحة أخرى)
            document.getElementById('inputPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';

            // تشغيل الألعاب النارية لمدة 3 ثواني
            fireworks();
        }

        function fireworks() {
            var duration = 3 * 1000; // 3 ثواني
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                // خروج الألعاب النارية من الأسفل (اليسار واليمين)
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: 1 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: 1 } }));
            }, 250);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'تهنئة_فريق_برلين.png'; 
            link.href = canvas.toDataURL('image/png', 1.0); 
            link.click();
        }

        // دالة لزر الرجوع في حال أراد الشخص تعديل اسمه
        function goBack() {
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('inputPage').style.display = 'block';
        }
    </script>

</body>
</html>
